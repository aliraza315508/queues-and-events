spring.application.name=product-service
server.port=8083

# PostgreSQL connection. Override these environment variables for each environment.
spring.datasource.url=${PRODUCT_DB_URL:jdbc:postgresql://localhost:5434/product_db}
spring.datasource.username=${PRODUCT_DB_USERNAME:product_user}
spring.datasource.password=${PRODUCT_DB_PASSWORD:product_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns schema creation. Hibernate only validates mappings against the schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Keep the initial actuator surface small.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
