spring.application.name=order-service
server.port=8081

# PostgreSQL connection. Override these environment variables for each environment.
spring.datasource.url=${ORDER_DB_URL:jdbc:postgresql://localhost:5432/order_db}
spring.datasource.username=${ORDER_DB_USERNAME:order_user}
spring.datasource.password=${ORDER_DB_PASSWORD:order_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns schema creation. Hibernate only validates mappings against the schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka connection. Topics, serializers, producers, and consumers will be added later.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Keep the initial actuator surface small.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
