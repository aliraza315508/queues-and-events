spring.application.name=order-service
server.port=8081

# PostgreSQL connection. Override these environment variables for each environment.
spring.datasource.url=${ORDER_DB_URL:jdbc:postgresql://127.0.0.1:15432/order_db}
spring.datasource.username=${ORDER_DB_USERNAME:order_user}
spring.datasource.password=${ORDER_DB_PASSWORD:order_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns schema creation. Hibernate only validates mappings against the schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka connection. Topics, serializers, producers, and consumers will be added later.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Kafka producer configuration for publishing order events.
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Kafka topic names used by order-service.
app.kafka.topics.order-created=order.created

# Keep the initial actuator surface small.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized