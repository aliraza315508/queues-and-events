spring.application.name=notification-service
server.port=8086

# PostgreSQL connection. Override these environment variables for each environment.
spring.datasource.url=${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5437/notification_db}
spring.datasource.username=${NOTIFICATION_DB_USERNAME:notification_user}
spring.datasource.password=${NOTIFICATION_DB_PASSWORD:notification_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns schema creation. Hibernate only validates mappings against the schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka connection. Topics, serializers, producers, and consumers will be added later.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# RabbitMQ connection. Exchanges, queues, bindings, and workers will be added later.
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Keep the initial actuator surface small.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.rabbit.enabled=false
