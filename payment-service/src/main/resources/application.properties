spring.application.name=payment-service
server.port=8085

# PostgreSQL connection. Override these environment variables for each environment.
spring.datasource.url=${PAYMENT_DB_URL:jdbc:postgresql://localhost:5436/payment_db}
spring.datasource.username=${PAYMENT_DB_USERNAME:payment_user}
spring.datasource.password=${PAYMENT_DB_PASSWORD:payment_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns schema creation. Hibernate only validates mappings against the schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka connection. Topics, serializers, producers, and consumers will be added later.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Keep the initial actuator surface small.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Kafka consumer configuration for reading inventory events.
spring.kafka.consumer.group-id=payment-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.aliraza.ecommerce.*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.aliraza.ecommerce.paymentservice.event.InventoryReservedEvent

# Kafka producer configuration for publishing payment events.
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Kafka topic names used by payment-service.
app.kafka.topics.inventory-reserved=inventory.reserved
app.kafka.topics.payment-completed=payment.completed
app.kafka.topics.payment-failed=payment.failed
