spring.application.name=customer-service
server.port=8082

# PostgreSQL connection. Override these environment variables for each environment.
spring.datasource.url=${CUSTOMER_DB_URL:jdbc:postgresql://localhost:5433/customer_db}
spring.datasource.username=${CUSTOMER_DB_USERNAME:customer_user}
spring.datasource.password=${CUSTOMER_DB_PASSWORD:customer_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns schema creation. Hibernate only validates mappings against the schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Keep the initial actuator surface small.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
