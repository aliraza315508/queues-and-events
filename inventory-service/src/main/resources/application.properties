spring.application.name=inventory-service
server.port=8084

# PostgreSQL connection. Override these environment variables for each environment.
spring.datasource.url=${INVENTORY_DB_URL:jdbc:postgresql://localhost:5435/inventory_db}
spring.datasource.username=${INVENTORY_DB_USERNAME:inventory_user}
spring.datasource.password=${INVENTORY_DB_PASSWORD:inventory_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns schema creation. Hibernate only validates mappings against the schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka connection. Topics, serializers, producers, and consumers will be added later.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Keep the initial actuator surface small.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Kafka consumer configuration for reading order events.
spring.kafka.consumer.group-id=inventory-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.aliraza.ecommerce.*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.aliraza.ecommerce.inventoryservice.event.OrderCreatedEvent

# Kafka producer configuration for publishing inventory events.
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Kafka topic names used by inventory-service.
app.kafka.topics.order-created=order.created
app.kafka.topics.inventory-reserved=inventory.reserved
app.kafka.topics.inventory-rejected=inventory.rejected
